name: Update and Deploy Kaspa Data

on:
  schedule:
    - cron: '0 16 * * *' # Runs at 16:00 UTC (8:00 AM PST) every day
    - cron: '10 0 * * *' # Runs at 00:10 UTC (4:10 PM PST) every day
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16' # Update Node.js version to 16

      - name: Install dependencies
        run: yarn install

      - name: Run fetch_data script
        run: node src/utils/fetch_data.js public/data

      - name: Check for changes
        id: git_status
        run: |
          git add public/data/*
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
            echo "::set-output name=changes::false"
          else
            echo "Changes detected"
            echo "::set-output name=changes::true"
          fi

      - name: Commit and push changes
        continue-on-error: true
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git commit -m 'Update Kaspa prices data'
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main

      - name: Run predeploy
        run: yarn predeploy

      - name: Run deploy
        env:
          GIT_USER: github-actions[bot]
          GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          yarn deploy